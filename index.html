<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 Burricat Battle 🐤</title>
    <!-- Pixel Font -->
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Cohesive Marie & Tweety Palette */
            --bg-color: #fffaf0;
            /* Warm floral white / cream */
            --surface-color: #ffffff;
            /* Clean white for cards */
            --border-color: #5d4037;
            /* Warm dark brown for pixel borders */
            --text-main: #4e342e;
            /* Dark espresso brown */
            --text-light: #8d6e63;
            /* Soft taupe brown */

            --btn-bg: #ffe0b2;
            /* Soft peachy yellow */
            --btn-hover: #ffcc80;
            /* Warmer peach */
            --btn-active: #ffb74d;
            /* Orange-peach */

            --primary-glow: rgba(255, 141, 161, 0.4);

            --p1-color: #ff8da1;
            /* Soft carnation pink (Marie) */
            --p2-color: #ffca28;
            /* Warm marigold yellow (Tweety) */

            --correct-color: #aed581;
            /* Soft pastel green */
            --wrong-color: #ef9a9a;
            /* Soft pastel red */

            --pixel-shadow: 6px 6px 0px var(--border-color);
            --pixel-shadow-sm: 4px 4px 0px var(--border-color);
            --pixel-shadow-hover: 2px 2px 0px var(--border-color);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'VT323', monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255, 141, 161, 0.15) 15px, transparent 16px),
                radial-gradient(circle at 80% 60%, rgba(255, 202, 40, 0.15) 15px, transparent 16px),
                radial-gradient(circle at 50% 90%, rgba(255, 141, 161, 0.1) 15px, transparent 16px),
                radial-gradient(circle at 10% 80%, rgba(255, 202, 40, 0.1) 15px, transparent 16px);
        }

        /* Animated Stickers */
        .sticker {
            position: absolute;
            width: 120px;
            height: auto;
            z-index: 10;
            pointer-events: none;
            animation: float 4s infinite ease-in-out;
            filter: drop-shadow(4px 4px 0px var(--border-color));
        }

        .st1 {
            top: 5%;
            left: 5%;
            animation-delay: 0s;
            width: 140px;
        }

        .st2 {
            top: 10%;
            right: 5%;
            animation-delay: 0.5s;
            width: 130px;
        }

        .st3 {
            bottom: 10%;
            left: 10%;
            animation-delay: 1s;
        }

        .st4 {
            bottom: 15%;
            right: 10%;
            animation-delay: 1.5s;
            width: 110px;
        }

        .st5 {
            top: 40%;
            left: 2%;
            animation-delay: 2s;
            width: 100px;
        }

        .st6 {
            top: 50%;
            right: 2%;
            animation-delay: 2.5s;
            width: 150px;
        }

        .st7 {
            bottom: 0%;
            left: 45%;
            animation-delay: 3s;
            width: 120px;
        }

        .st8 {
            top: 2%;
            left: 40%;
            animation-delay: 3.5s;
            width: 130px;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-15px) rotate(3deg);
            }
        }

        #app {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            position: relative;
            z-index: 20;
            /* Above background stickers */
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s steps(4, end);
            width: 100%;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Pixel Card */
        .pixel-card {
            background: var(--surface-color);
            border: 4px solid var(--border-color);
            padding: 40px;
            width: 100%;
            text-align: center;
            box-shadow: var(--pixel-shadow);
            position: relative;
        }

        h1 {
            font-size: 4rem;
            font-weight: normal;
            margin-bottom: 10px;
            color: var(--p1-color);
            text-shadow: 4px 4px 0px var(--border-color);
            letter-spacing: 2px;
        }

        h2 {
            font-size: 3rem;
            font-weight: normal;
            margin-bottom: 20px;
            color: var(--border-color);
        }

        p {
            color: var(--text-light);
            margin-bottom: 30px;
            font-size: 1.6rem;
        }

        /* Buttons */
        .btn {
            background: var(--btn-bg);
            color: var(--border-color);
            border: 4px solid var(--border-color);
            padding: 15px 30px;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.1s steps(2, end);
            width: 100%;
            max-width: 320px;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: var(--pixel-shadow-sm);
            text-transform: uppercase;
        }

        .btn:hover:not(:disabled) {
            background: var(--btn-hover);
            transform: translate(2px, 2px);
            box-shadow: var(--pixel-shadow-hover);
        }

        .btn:active:not(:disabled) {
            background: var(--btn-active);
            transform: translate(4px, 4px);
            box-shadow: none;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: none;
            transform: translate(4px, 4px);
        }

        .btn-primary {
            background: var(--p1-color);
            color: #fff;
            text-shadow: 2px 2px 0px var(--border-color);
        }

        .btn-primary:hover:not(:disabled) {
            background: #ff738b;
        }

        .btn-secondary {
            background: var(--p2-color);
            color: var(--border-color);
            text-shadow: 1px 1px 0px #fff;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #ffb300;
        }

        /* Inputs */
        input[type="text"] {
            width: 100%;
            max-width: 320px;
            padding: 15px 20px;
            border: 4px solid var(--border-color);
            background: #fff;
            color: var(--border-color);
            font-size: 2rem;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            box-shadow: inset 4px 4px 0px rgba(0, 0, 0, 0.05);
            text-transform: uppercase;
        }

        input[type="text"]:focus {
            background: #fffaff;
        }

        /* Drop Zone */
        .drop-zone {
            border: 4px dashed var(--border-color);
            background: #fffafa;
            padding: 40px 20px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            background: #ffe4e1;
            border-style: solid;
        }

        .drop-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .room-code-display {
            font-size: 3.5rem;
            letter-spacing: 5px;
            color: var(--border-color);
            background: #fff;
            padding: 15px 30px;
            border: 4px solid var(--border-color);
            box-shadow: var(--pixel-shadow-sm);
            margin: 20px 0;
            display: inline-block;
        }

        /* Battle Arena */
        .header-stats {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 30px;
            gap: 20px;
        }

        .player-stat {
            flex: 1;
            background: #fff;
            border: 4px solid var(--border-color);
            padding: 20px;
            text-align: center;
            position: relative;
            box-shadow: var(--pixel-shadow-sm);
        }

        .player-stat::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 10px;
        }

        #stat-p1::before {
            background: var(--p1-color);
        }

        #stat-p2::before {
            background: var(--p2-color);
        }

        .player-name {
            font-size: 1.8rem;
            color: var(--text-light);
            margin-bottom: 10px;
        }

        .player-score {
            font-size: 3.5rem;
            color: var(--border-color);
        }

        .player-avatar {
            font-size: 3.5rem;
            margin-bottom: -5px;
        }

        .arena-content {
            width: 100%;
        }

        .question-box {
            background: #fff;
            border: 4px solid var(--border-color);
            padding: 30px 20px;
            font-size: 2.2rem;
            line-height: 1.3;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: var(--pixel-shadow-sm);
        }

        .choices-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .choices-grid {
                grid-template-columns: 1fr;
            }

            .header-stats {
                flex-direction: column;
                gap: 15px;
                margin-bottom: 20px;
            }

            .question-box {
                font-size: 1.6rem;
                padding: 20px;
            }

            .sticker {
                display: none;
            }

            /* hide stickers on mobile so they don't block UI */
        }

        .choice-btn {
            background: #fff;
            border: 4px solid var(--border-color);
            color: var(--text-main);
            padding: 20px;
            font-size: 1.6rem;
            cursor: pointer;
            text-align: left;
            position: relative;
            box-shadow: var(--pixel-shadow-sm);
            transition: all 0.1s steps(2, end);
            display: flex;
            align-items: center;
        }

        .choice-btn::before {
            content: '🎀';
            margin-right: 15px;
            opacity: 0.2;
            transition: opacity 0.2s;
        }

        .choice-btn:hover:not(:disabled) {
            background: #fff0f5;
            transform: translate(2px, 2px);
            box-shadow: var(--pixel-shadow-hover);
        }

        .choice-btn:hover:not(:disabled)::before {
            opacity: 1;
        }

        .choice-btn:disabled {
            cursor: not-allowed;
            box-shadow: none;
            transform: translate(4px, 4px);
            opacity: 0.8;
        }

        .choice-btn.selected {
            background: #e6e6fa;
            border-color: var(--border-color);
        }

        .choice-btn.correct {
            background: var(--correct-color);
            color: var(--border-color);
        }

        .choice-btn.wrong {
            background: var(--wrong-color);
            color: var(--border-color);
            text-decoration: line-through;
        }

        .choice-indicator {
            position: absolute;
            right: 15px;
            font-size: 2rem;
            display: none;
        }

        .choice-btn.correct .choice-indicator,
        .choice-btn.wrong .choice-indicator {
            display: block;
        }

        .battle-status {
            font-size: 2rem;
            text-align: center;
            min-height: 40px;
            margin-bottom: 25px;
            color: var(--text-light);
        }

        .battle-status.highlight {
            color: var(--border-color);
            background: #fff;
            border: 4px solid var(--border-color);
            display: inline-block;
            padding: 10px 20px;
            box-shadow: var(--pixel-shadow-sm);
        }

        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0% {
                content: '';
            }

            25% {
                content: '.';
            }

            50% {
                content: '..';
            }

            75% {
                content: '...';
            }
        }

        .winner-trophy {
            font-size: 6rem;
            margin-bottom: 10px;
            animation: bounce 1s infinite steps(2, end);
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .final-scores {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin: 40px 0;
        }

        .final-score-item {
            text-align: center;
            background: #fff;
            border: 4px solid var(--border-color);
            padding: 20px 40px;
            box-shadow: var(--pixel-shadow-sm);
        }

        .final-score-value {
            font-size: 4rem;
            color: var(--border-color);
            margin-top: 10px;
        }

        .p1-color-text {
            color: var(--p1-color);
            text-shadow: 2px 2px 0px var(--border-color);
        }

        .p2-color-text {
            color: var(--p2-color);
            text-shadow: 2px 2px 0px var(--border-color);
        }

        /* Chat Box */
        .chat-container {
            width: 100%;
            background: #fff;
            border: 4px solid var(--border-color);
            margin-top: 20px;
            box-shadow: var(--pixel-shadow-sm);
            display: flex;
            flex-direction: column;
        }

        .chat-log {
            height: 150px;
            overflow-y: auto;
            padding: 15px;
            font-size: 1.6rem;
            text-align: left;
            border-bottom: 4px solid var(--border-color);
            background: #fffaf0;
        }

        .chat-msg {
            margin-bottom: 5px;
        }

        .chat-msg span {
            font-weight: bold;
        }

        .chat-input-area {
            display: flex;
            padding: 10px;
            gap: 10px;
            background: #fff;
        }

        .chat-input-area input {
            flex: 1;
            margin-bottom: 0;
            padding: 10px;
            font-size: 1.6rem;
        }

        .chat-send-btn {
            width: auto;
            max-width: none;
            margin-bottom: 0;
            padding: 10px 20px;
            font-size: 1.6rem;
        }
    </style>
    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body>

    <!-- Floating Stickers in Background -->
    <img src="stick1.png" class="sticker st1" alt="">
    <img src="stick2.png" class="sticker st2" alt="">
    <img src="stick3.png" class="sticker st3" alt="">
    <img src="stick4.png" class="sticker st4" alt="">
    <img src="stick5.png" class="sticker st5" alt="">
    <img src="stick6.png" class="sticker st6" alt="">
    <img src="stick7.png" class="sticker st7" alt="">
    <img src="stick8.png" class="sticker st8" alt="">

    <div id="app">

        <!-- State: Start / Select Mode -->
        <div id="state-start" class="screen active">
            <div class="pixel-card">
                <h1>BURRICAT</h1>


                <!-- Name Input Field -->
                <input type="text" id="player-name-input" placeholder="Enter Your Name" maxlength="12">

                <button class="btn btn-primary" id="btn-create-room">
                    <span>🎀 Host Game</span>
                </button>
                <button class="btn btn-secondary" id="btn-join-room">
                    <span>🐤 Join Game</span>
                </button>
            </div>
        </div>

        <!-- State: Host Lobby -->
        <div id="state-host-lobby" class="screen">
            <div class="pixel-card">
                <h2>Host The Show</h2>
                <p>Give this code to your opponent:</p>

                <div class="room-code-display" id="host-room-code">...</div>

                <div class="drop-zone" id="file-drop-zone">
                    <div class="drop-icon">📦</div>
                    <div id="drop-label">Drop Quiz JSON Here<br>or Click</div>
                </div>
                <input type="file" id="file-input" accept=".json,.txt" style="display:none">

                <div id="host-status" class="battle-status">Waiting for player 2<span class="loading-dots"></span></div>

                <button class="btn btn-primary" id="btn-start-game" style="display:none;">Start Game!</button>
                <button class="btn" id="btn-host-back" style="margin-top:10px;">Back</button>
            </div>
        </div>

        <!-- State: Join Lobby -->
        <div id="state-join-lobby" class="screen">
            <div class="pixel-card">
                <h2>Join The Details</h2>
                <p>Enter the secret code:</p>

                <input type="text" id="join-room-input" placeholder="ROOM CODE" autocomplete="off" spellcheck="false"
                    maxlength="10">

                <div id="join-status" class="battle-status">Ready to connect</div>

                <button class="btn btn-secondary" id="btn-connect">Connect</button>
                <button class="btn" id="btn-join-back" style="margin-top:10px;">Back</button>
            </div>
        </div>

        <!-- State: Battle Arena -->
        <div id="state-battle" class="screen">
            <div class="header-stats">
                <div class="player-stat" id="stat-p1">
                    <div class="player-avatar">🎀</div>
                    <div class="player-name p1-color-text" id="name-p1">Player 1</div>
                    <div class="player-score">⭐ <span id="score-p1">0</span></div>
                </div>
                <div class="player-stat" id="stat-p2">
                    <div class="player-avatar">🐤</div>
                    <div class="player-name p2-color-text" id="name-p2">Player 2</div>
                    <div class="player-score">⭐ <span id="score-p2">0</span></div>
                </div>
            </div>

            <div class="arena-content">
                <div class="question-box" id="question-text">
                    Loading... ✨
                </div>

                <div class="choices-grid" id="choices-grid">
                    <!-- Choices generated here -->
                </div>

                <div style="text-align: center;">
                    <div id="battle-msg" class="battle-status"></div>
                    <button class="btn btn-primary" id="btn-next-q" style="display:none; margin: 0 auto;">Next
                        Question</button>
                </div>
            </div>

            <!-- Chat Window -->
            <div class="chat-container">
                <div class="chat-log" id="chat-log">
                    <div><em>Say hi to your opponent! ✨</em></div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Say something..." autocomplete="off">
                    <button class="btn btn-primary chat-send-btn" id="btn-send-chat">Send</button>
                </div>
            </div>

        </div>

        <!-- State: Results -->
        <div id="state-results" class="screen">
            <div class="pixel-card">
                <div class="winner-trophy">✨🏆✨</div>
                <h1 id="winner-text">Player 1 Wins!</h1>

                <div class="final-scores">
                    <div class="final-score-item">
                        <div class="player-name p1-color-text" id="final-name-p1">Player 1</div>
                        <div class="final-score-value" id="final-p1">0</div>
                    </div>
                    <div class="final-score-item">
                        <div class="player-name p2-color-text" id="final-name-p2">Player 2</div>
                        <div class="final-score-value" id="final-p2">0</div>
                    </div>
                </div>

                <button class="btn btn-primary" id="btn-home">Play Again</button>
            </div>
        </div>

    </div>

    <script>
        /**
         * Marie & Tweety Quiz Battle Logic
         */

        const screens = document.querySelectorAll('.screen');
        const btnCreateRoom = document.getElementById('btn-create-room');
        const btnJoinRoomBtn = document.getElementById('btn-join-room');
        const playerNameInput = document.getElementById('player-name-input');

        const hostRoomCode = document.getElementById('host-room-code');
        const fileDropZone = document.getElementById('file-drop-zone');
        const fileInput = document.getElementById('file-input');
        const dropLabel = document.getElementById('drop-label');
        const hostStatus = document.getElementById('host-status');
        const btnStartGame = document.getElementById('btn-start-game');

        const joinRoomInput = document.getElementById('join-room-input');
        const btnConnect = document.getElementById('btn-connect');
        const joinStatus = document.getElementById('join-status');

        const nameP1 = document.getElementById('name-p1');
        const nameP2 = document.getElementById('name-p2');
        const scoreP1 = document.getElementById('score-p1');
        const scoreP2 = document.getElementById('score-p2');
        const questionText = document.getElementById('question-text');
        const choicesGrid = document.getElementById('choices-grid');
        const battleMsg = document.getElementById('battle-msg');
        const btnNextQ = document.getElementById('btn-next-q');

        const winnerText = document.getElementById('winner-text');
        const finalNameP1 = document.getElementById('final-name-p1');
        const finalNameP2 = document.getElementById('final-name-p2');
        const finalP1 = document.getElementById('final-p1');
        const finalP2 = document.getElementById('final-p2');
        const btnHome = document.getElementById('btn-home');

        const chatLog = document.getElementById('chat-log');
        const chatInput = document.getElementById('chat-input');
        const btnSendChat = document.getElementById('btn-send-chat');

        let peer = null;
        let conn = null;
        let isHost = false;

        let myName = '';
        let opponentName = '';

        let questions = [];
        let currentQIndex = 0;
        let p1Score = 0;
        let p2Score = 0;

        let p1Answer = null;
        let p2Answer = null;
        let isRevealed = false;


        function showScreen(id) {
            screens.forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function generateShortId() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }


        function parseContent(raw) {
            const trimmed = raw.trim();
            if (!trimmed) return [];
            try {
                const parsed = JSON.parse(trimmed);
                let qArray = [];
                if (parsed.questions && Array.isArray(parsed.questions)) {
                    qArray = parsed.questions;
                } else if (Array.isArray(parsed)) {
                    qArray = parsed;
                }

                return qArray
                    .filter(q => q.question && q.answer)
                    .map(q => ({
                        question: String(q.question).trim(),
                        choices: Array.isArray(q.choices) ? q.choices.map(c => String(c).trim()) : [],
                        answer: String(q.answer).trim()
                    }));
            } catch (e) {
                console.error("Parse error", e);
            }
            return [];
        }


        btnCreateRoom.addEventListener('click', () => {
            myName = playerNameInput.value.trim() || 'Marie';
            isHost = true;
            showScreen('state-host-lobby');
            initHostPeer();
        });

        btnJoinRoomBtn.addEventListener('click', () => {
            myName = playerNameInput.value.trim() || 'Tweety';
            isHost = false;
            showScreen('state-join-lobby');
        });

        document.getElementById('btn-host-back').addEventListener('click', () => {
            if (peer) { peer.destroy(); peer = null; }
            showScreen('state-start');
        });
        document.getElementById('btn-join-back').addEventListener('click', () => {
            if (peer) { peer.destroy(); peer = null; }
            showScreen('state-start');
        });
        btnHome.addEventListener('click', () => {
            if (peer) { peer.destroy(); peer = null; }
            showScreen('state-start');
        });



        fileDropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) processFile(e.target.files[0]);
        });
        fileDropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileDropZone.classList.add('dragover');
        });
        fileDropZone.addEventListener('dragleave', () => fileDropZone.classList.remove('dragover'));
        fileDropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            fileDropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) processFile(e.dataTransfer.files[0]);
        });

        function processFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const parsed = parseContent(e.target.result);
                if (parsed.length > 0) {
                    questions = parsed;
                    dropLabel.innerHTML = `Loaded: ${file.name}<br>${parsed.length} questions ready! ✨`;
                    checkHostReady();
                } else {
                    dropLabel.innerHTML = `<span style="color:var(--wrong-color)">Oops, bad file!</span><br>Try again ✨`;
                }
            };
            reader.readAsText(file);
        }


        function initHostPeer() {
            const shortId = generateShortId();
            hostRoomCode.textContent = '...';

            peer = new Peer('burricat-' + shortId);

            peer.on('open', (id) => {
                hostRoomCode.textContent = shortId;
            });

            peer.on('connection', (c) => {
                if (conn) { c.close(); return; }
                conn = c;
                setupConnection();
                // UI updated when JOIN_INFO arrives
                checkHostReady();
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    initHostPeer();
                } else {
                    hostStatus.innerHTML = `Error: ${err.message} ✨`;
                    hostStatus.classList.remove('loading-dots');
                }
            });
        }

        function checkHostReady() {
            if (conn && conn.open && questions.length > 0) {
                btnStartGame.style.display = 'inline-flex';
            } else {
                btnStartGame.style.display = 'none';
            }
        }

        btnConnect.addEventListener('click', () => {
            const code = joinRoomInput.value.trim().toUpperCase();
            if (!code) return;

            btnConnect.disabled = true;
            joinStatus.innerHTML = `Connecting<span class="loading-dots"></span>`;

            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect('burricat-' + code);
                setupConnection();
            });

            peer.on('error', (err) => {
                btnConnect.disabled = false;
                joinStatus.innerHTML = `Error: ${err.message} ✨`;
            });
        });

        function setupConnection() {
            conn.on('open', () => {
                if (!isHost) {
                    joinStatus.innerHTML = `Connected! Waiting for ${opponentName ? opponentName : 'host'}... ✨`;
                    conn.send({ type: 'JOIN_INFO', name: myName });
                } else {
                    checkHostReady();
                }
            });

            conn.on('data', (data) => {
                handleNetworkData(data);
            });

            conn.on('close', () => {
                alert("Opponent disconnected! ✨");
                showScreen('state-start');
            });
        }


        function handleNetworkData(data) {
            if (data.type === 'JOIN_INFO') {
                opponentName = data.name;
                hostStatus.innerHTML = `${opponentName} joined! 🎀`;
                hostStatus.classList.remove('loading-dots');
            }
            else if (data.type === 'START') {
                questions = data.questions;
                opponentName = data.hostName;

                nameP1.textContent = opponentName;
                nameP2.textContent = myName;

                p1Score = 0; p2Score = 0;
                currentQIndex = 0;
                showScreen('state-battle');
                renderScore();
                renderWait(`Waiting for ${opponentName}...`);
            }
            else if (data.type === 'QUESTION') {
                currentQIndex = data.index;
                p1Answer = null; p2Answer = null; isRevealed = false;
                renderQuestion(questions[currentQIndex]);
            }
            else if (data.type === 'ANSWER') {
                if (isHost) {
                    p2Answer = data.value;
                    checkAnswers();
                }
            }
            else if (data.type === 'RESULT') {
                p1Score = data.p1Score;
                p2Score = data.p2Score;
                p1Answer = data.p1Ans;
                p2Answer = data.p2Ans;
                revealAnswers(data.correct);
            }
            else if (data.type === 'END') {
                showResults();
            }
            else if (data.type === 'CHAT') {
                appendChat(opponentName, data.text, false);
            }
        }


        btnStartGame.addEventListener('click', () => {
            conn.send({ type: 'START', questions, hostName: myName });

            nameP1.textContent = myName;
            nameP2.textContent = opponentName || 'Tweety';

            showScreen('state-battle');
            p1Score = 0; p2Score = 0;
            currentQIndex = 0;
            renderScore();
            sendNextQuestion();
        });

        function sendNextQuestion() {
            p1Answer = null; p2Answer = null; isRevealed = false;
            let payload = { type: 'QUESTION', index: currentQIndex };
            conn.send(payload);
            renderQuestion(questions[currentQIndex]);
        }

        function checkAnswers() {
            if (p1Answer !== null && p2Answer !== null && !isRevealed) {
                isRevealed = true;
                const correct = String(questions[currentQIndex].answer);

                const isP1Correct = p1Answer.startsWith(correct) || p1Answer === correct;
                const isP2Correct = p2Answer.startsWith(correct) || p2Answer === correct;

                if (isP1Correct) p1Score++;
                if (isP2Correct) p2Score++;

                conn.send({
                    type: 'RESULT',
                    p1Score, p2Score,
                    p1Ans: p1Answer, p2Ans: p2Answer,
                    correct: correct
                });

                revealAnswers(correct);
            }
        }


        btnNextQ.addEventListener('click', () => {
            currentQIndex++;
            if (currentQIndex >= questions.length) {
                conn.send({ type: 'END' });
                showResults();
            } else {
                btnNextQ.style.display = 'none';
                sendNextQuestion();
            }
        });


        function renderScore() {
            scoreP1.textContent = p1Score;
            scoreP2.textContent = p2Score;
        }

        function renderWait(msg) {
            questionText.innerHTML = "<em>" + msg + "</em>";
            choicesGrid.innerHTML = "";
            battleMsg.innerHTML = `<span class="loading-dots"></span>`;
            battleMsg.className = 'battle-status';
            btnNextQ.style.display = 'none';
        }

        function renderQuestion(qObj) {
            questionText.textContent = qObj.question;
            choicesGrid.innerHTML = '';

            qObj.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerHTML = `<span>${choice}</span><span class="choice-indicator"></span>`;
                btn.onclick = () => selectAnswer(choice);
                choicesGrid.appendChild(btn);
            });

            battleMsg.textContent = "Your turn... ✨";
            battleMsg.className = 'battle-status';
            btnNextQ.style.display = 'none';
        }

        function selectAnswer(choiceStr) {
            if (isRevealed) return;

            const pAnswerState = (isHost) ? p1Answer : p2Answer;
            if (pAnswerState !== null) return;

            Array.from(choicesGrid.children).forEach(btn => {
                if (btn.firstChild.textContent === choiceStr) {
                    btn.classList.add('selected');
                } else {
                    btn.disabled = true;
                }
            });

            if (isHost) {
                p1Answer = choiceStr;
                battleMsg.innerHTML = `Waiting for ${opponentName || 'Player 2'}<span class="loading-dots"></span>`;
                checkAnswers();
            } else {
                p2Answer = choiceStr;
                conn.send({ type: 'ANSWER', value: choiceStr });
                battleMsg.innerHTML = `Sent! Waiting for ${opponentName || 'Host'}<span class="loading-dots"></span>`;
            }
        }

        function revealAnswers(correctAnswerStr) {
            const qObj = questions[currentQIndex];
            renderScore();

            Array.from(choicesGrid.children).forEach(btn => {
                const cText = btn.firstChild.textContent;
                const isCorrectChoice = cText.startsWith(correctAnswerStr) || cText === correctAnswerStr;

                btn.classList.remove('selected');

                let indicator = '';
                if (cText === p1Answer) indicator += ' 🎀';
                if (cText === p2Answer) indicator += ' 🐤';

                btn.querySelector('.choice-indicator').textContent = indicator;

                if (isCorrectChoice) {
                    btn.classList.add('correct');
                } else {
                    btn.classList.add('wrong');
                }
            });

            let msg = "";
            const p1c = (p1Answer && (p1Answer.startsWith(correctAnswerStr) || p1Answer === correctAnswerStr));
            const p2c = (p2Answer && (p2Answer.startsWith(correctAnswerStr) || p2Answer === correctAnswerStr));

            const n1 = isHost ? myName : opponentName;
            const n2 = isHost ? opponentName : myName;

            if (p1c && p2c) msg = "Both got stars! ⭐⭐";
            else if (p1c) msg = `${n1} got a star! ⭐`;
            else if (p2c) msg = `${n2} got a star! ⭐`;
            else msg = "No stars! 🙀";

            battleMsg.innerHTML = msg;
            battleMsg.className = 'battle-status highlight';

            if (isHost) {
                btnNextQ.style.display = 'block';
            }
        }

        function showResults() {
            showScreen('state-results');
            finalP1.textContent = p1Score;
            finalP2.textContent = p2Score;

            const n1 = isHost ? myName : opponentName;
            const n2 = isHost ? opponentName : myName;

            finalNameP1.textContent = n1;
            finalNameP2.textContent = n2;

            if (p1Score > p2Score) {
                winnerText.innerHTML = `${n1} Wins! 👑🎀`;
                winnerText.className = "p1-color-text";
            } else if (p2Score > p1Score) {
                winnerText.innerHTML = `${n2} Wins! 👑🐤`;
                winnerText.className = "p2-color-text";
            } else {
                winnerText.innerHTML = "It's a Tie! ✨✨";
                winnerText.className = "";
            }
        }

        function appendChat(name, text, isMe) {
            const div = document.createElement('div');
            div.className = 'chat-msg';
            const colorClass = (name === myName && isHost) ? 'p1-color-text' :
                (name === myName && !isHost) ? 'p2-color-text' :
                    (isHost) ? 'p2-color-text' : 'p1-color-text';
            div.innerHTML = `<span class="${colorClass}">[${name}]</span> ${text}`;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function sendChat() {
            const txt = chatInput.value.trim();
            if (!txt) return;
            appendChat(myName, txt, true);
            if (conn && conn.open) conn.send({ type: 'CHAT', text: txt });
            chatInput.value = '';
        }

        btnSendChat.addEventListener('click', sendChat);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChat();
        });

        (function autoScan() {
            fetch('quizzes.json')
                .then(res => res.json())
                .then(manifest => {
                    if (manifest && manifest.length > 0) {
                    }
                }).catch(() => { });
        })();

    </script>
</body>

</html>
